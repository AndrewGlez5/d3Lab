<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Leaf Project</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
</head>

<body>

<nav class="navbar navbar-default">
    <div class="container">
        <a class="navbar-brand" href="#">
            <img id="logo" src="img/logo.png">
        </a>
    </div>
</nav>

<div class="container">
    <div class="row" style="margin-bottom:20px;">
        
        <button id="play-button" class="btn btn-primary">Play</button>
        <button id="reset-button" class="btn btn-secondary">Reset</button>

        <label style="margin-left:20px;">Year: <span id="year">1800</span></label>

        <div id="slider" style="width:300px; display:inline-block; margin-left:20px;"></div>

        <select id="continent-select" class="form-control" style="width:150px; display:inline-block; margin-left:20px;">
            <option value="all">All</option>
        </select>

    </div>

    <div class="row">
        <div id="chart-area"></div>
    </div>
</div>

<script src="js/jquery.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script src="js/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3-tip/0.9.1/d3-tip.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
